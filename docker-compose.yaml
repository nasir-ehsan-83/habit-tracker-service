services:
  api:
    build:
      context: ./habit-tracker
      dockerfile: Dockerfile
    container_name: habit-tracker-api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./habit-tracker/.env
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - habit-network
    volumes:
      - ./habit-tracker/app:/app/app
      - ./habit-tracker/logs:/app/logs

  mongodb:
    image: mongo:7.0
    container_name: habit-tracker-mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: habit_tracker
    volumes:
      - mongo_data:/data/db
    networks:
      - habit-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express
    container_name: habit-tracker-mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@mongodb:27017/
    depends_on:
      - mongodb
    networks:
      - habit-network

volumes:
  mongo_data:
    driver: local

networks:
  habit-network:
    driver: bridge